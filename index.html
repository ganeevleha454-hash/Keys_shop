<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .roulette-container { position: relative; width: 100%; height: 80px; overflow: hidden; background: #111; border: 2px solid gold; border-radius: 10px; margin: 15px 0; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: red; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; transition: 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 70px; height: 70px; margin: 5px; background: #2a2a2a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .btn-spin { background: linear-gradient(45deg, #FFD700, #FFA500); border: none; padding: 15px; width: 100%; border-radius: 12px; color: black; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-spin:active { transform: scale(0.95); }
        .inventory-item { display: flex; justify-content: space-between; align-items: center; background: #252525; padding: 10px; margin-top: 10px; border-radius: 10px; border-left: 4px solid #00d2ff; }
        .timer { font-size: 11px; color: #ff4444; }
        .btn-action { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-left: 5px; }
    </script>
</head>
<body>

    <div class="card">
        <h2 style="margin: 0; color: gold;">🎰 LUCK BOX 🎰</h2>
        <p style="font-size: 14px; color: #aaa;">Испытай удачу за 50 🎟</p>
        <div class="roulette-container">
            <div class="pointer"></div>
            <div class="tape" id="tape"></div>
        </div>
        <button class="btn-spin" onclick="startSpin()">КРУТИТЬ КЕЙС</button>
    </div>

    <div class="card">
        <h3 style="margin: 0 0 10px 0;">🎒 ИНВЕНТАРЬ</h3>
        <div id="inventory-list">
            <p style="color: #666; font-size: 14px;">Ваш инвентарь пуст</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Генерация ленты
        const tape = document.getElementById('tape');
        const icons = ['🎁', '🎟', '📦', '⭐', '💀', '💎'];
        for (let i = 0; i < 60; i++) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = icons[Math.floor(Math.random() * icons.length)];
            tape.appendChild(div);
        }

        function startSpin() {
            const btn = document.querySelector('.btn-spin');
            btn.disabled = true;
            btn.innerText = "УДАЧА БЛИЗКО...";
            const randomOffset = Math.floor(Math.random() * 500) + 3200;
            tape.style.transform = `translateX(-${randomOffset}px)`;
            setTimeout(() => {
                tg.sendData(JSON.stringify({ action: "spin_case" }));
                tg.close();
            }, 5500);
        }

        // Функция обмена (для кнопок в инвентаре)
        function exchangeItem(itemId) {
            tg.sendData(JSON.stringify({ action: "exchange_item", id: itemId }));
            tg.close();
        }
    </script>
</body>
</html>
