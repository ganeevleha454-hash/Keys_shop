<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luck Box</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
            overflow-x: hidden;
        }
        .card { 
            background: #1e1e1e; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        .roulette-container { 
            position: relative; 
            width: 100%; 
            height: 90px; 
            overflow: hidden; 
            background: #111; 
            border: 2px solid gold; 
            border-radius: 12px; 
            margin: 20px 0; 
        }
        .pointer { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            width: 4px; 
            height: 100%; 
            background: #ff0000; 
            z-index: 10; 
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        .tape { 
            display: flex; 
            position: absolute; 
            left: 0; 
            top: 10px;
            transition: 5s cubic-bezier(0.1, 0, 0.1, 1); 
            will-change: transform;
        }
        .item { 
            min-width: 70px; 
            height: 70px; 
            margin: 0 5px; 
            background: #2a2a2a; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            border: 1px solid #444;
        }
        .btn-spin { 
            background: linear-gradient(45deg, #FFD700, #FFA500); 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 15px; 
            color: black; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 4px 0 #b8860b;
        }
        .btn-spin:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #b8860b;
        }
        .btn-spin:disabled {
            background: #555;
            box-shadow: none;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin: 0; color: gold; letter-spacing: 2px;">🎰 LUCK BOX 🎰</h2>
        <p style="font-size: 14px; color: #aaa; margin-top: 5px;">Испытай удачу!</p>
        
        <div class="roulette-container">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        
        <button id="spin-button" class="btn-spin" onclick="startSpin()">КРУТИТЬ КЕЙС</button>
    </div>

    <div class="card">
        <h3 style="margin: 0 0 10px 0; font-size: 16px;">🎒 ТВОЙ ИНВЕНТАРЬ</h3>
        <div id="inventory" style="color: #666; font-size: 14px; padding: 10px;">
            Пока здесь пусто...
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const tape = document.getElementById('tape');
        const btn = document.getElementById('spin-button');
        const icons = ['🎁', '💎', '⭐', '🎫', '📦', '🔥', '💰', '👑'];

        // 1. Генерируем ленту сразу при загрузке
        function buildTape() {
            tape.innerHTML = '';
            // Создаем 80 элементов для длинной прокрутки
            for (let i = 0; i < 80; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = icons[Math.floor(Math.random() * icons.length)];
                tape.appendChild(div);
            }
        }
        buildTape();

        // 2. Функция кручения
        function startSpin() {
            btn.disabled = true;
            btn.innerText = "КРУТИМ...";

            // Сбрасываем ленту в начало перед новым стартом
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            
            // Небольшая задержка, чтобы браузер успел применить сброс
            setTimeout(() => {
                tape.style.transition = "5s cubic-bezier(0.1, 0, 0.1, 1)";
                // Рассчитываем случайную остановку (примерно 3500-4000 пикселей)
                const finalOffset = Math.floor(Math.random() * 400) + 3800;
                tape.style.transform = `translateX(-${finalOffset}px)`;
            }, 50);

            // 3. Конец анимации
            setTimeout(() => {
                const winIcon = icons[Math.floor(Math.random() * icons.length)];
                alert("Выпало: " + winIcon);
                
                // Если мы в Telegram, можно отправить данные боту
                if (tg && tg.sendData) {
                    // tg.sendData("win_" + winIcon); // Можно включить позже
                }

                btn.disabled = false;
                btn.innerText = "КРУТИТЬ ЕЩЕ";
            }, 5500);
        }
    </script>
</body>
</html>
